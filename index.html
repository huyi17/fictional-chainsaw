<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>设备采购查价表 · 内部查询</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #f3f6f9; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,30,40,0.85); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: white; border-radius: 32px; padding: 40px; width: 400px; max-width: 90%; box-shadow: 0 30px 50px rgba(0,0,0,0.3); }
        .login-box h2 { color: #0f3b5e; margin:0 0 15px 0; border-left:6px solid #2a7f6e; padding-left:20px; }
        .login-input-group { margin-bottom:22px; }
        .login-input-group label { display:block; font-weight:600; margin-bottom:8px; color:#1a4e5e; }
        .login-input-group input { width:100%; padding:16px 18px; border:1px solid #b8ccd6; border-radius:20px; font-size:16px; }
        .password-wrapper { position:relative; }
        .toggle-password { position:absolute; right:18px; top:50%; transform:translateY(-50%); cursor:pointer; }
        .login-btn { background:#0f5b6b; color:white; border:none; padding:16px; border-radius:40px; font-weight:600; width:100%; cursor:pointer; }
        .error-msg { color:#c2414a; font-size:14px; margin-top:15px; text-align:center; }
        .container { max-width:1550px; width:100%; background:white; border-radius:20px; padding:30px 25px; display:none; }
        h1 { font-size:28px; font-weight:600; color:#0b3b5c; margin:0 0 8px 0; }
        .meta-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #dfe7ed; padding-bottom: 12px; }
        .query-section { background:#fafcff; border:1px solid #cbd5e1; border-radius:16px; padding:25px; margin-bottom:35px; }
        .section-title { font-size:20px; font-weight:600; color:#0f3b5e; border-left:6px solid #2a7f6e; padding-left:18px; margin-bottom:20px; }
        .filter-row { display:flex; flex-wrap:wrap; gap:20px; align-items:flex-end; margin-bottom:20px; }
        .filter-item { flex:1 1 180px; display:flex; flex-direction:column; gap:8px; }
        .filter-item label { font-weight:600; font-size:14px; color:#2c4c61; }
        .filter-item input, .filter-item select { padding:12px 15px; border:1px solid #bccbd3; border-radius:12px; width:100%; }
        .btn { background:#0f5b6b; color:white; padding:12px 24px; border-radius:40px; border:none; font-weight:600; cursor:pointer; }
        .results-count { margin-top:15px; font-size:15px; color:#2e5c6e; }
        .table-wrapper { overflow-x:auto; border-radius:14px; border:1px solid #dfe7ed; max-height:600px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:14px; min-width:1000px; }
        th { background:#e9f0f5; padding:14px 12px; position:sticky; top:0; }
        td { padding:12px; border-bottom:1px solid #e1e9ee; }
        .price-col { font-weight:600; color:#0b5e4b; }
        .match-badge { display:inline-block; background:#e3f2f0; padding:4px 10px; border-radius:30px; font-size:12px; }
        .footer-note { margin-top:30px; text-align:center; color:#4e6b7a; border-top:1px dashed #cbdae2; padding-top:20px; }
        .note-text { font-size:13px; color:#5b7e8f; text-align:center; margin-top: 15px; }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 设备采购查价系统</h2>
        <div class="login-input-group">
            <label>访问密码</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="请输入密码">
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>
        </div>
        <button class="login-btn" id="loginBtn">进入</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <h1>📋 设备采购价格查价表</h1>
    <div class="meta-info">
        <span>版本号：V1.4</span>
        <span>数据更新：2026-04-29</span>
    </div>
    <div class="query-section">
        <div class="section-title">🔍 查询条件</div>
        <div class="filter-row">
            <div class="filter-item"><label>📌 设备名称</label><input type="text" id="searchName" placeholder="例: 射流曝气器"></div>
            <div class="filter-item"><label>⚙️ 参数/型号</label><input type="text" id="searchParam" placeholder="例: 3路/PP"></div>
            <div class="filter-item"><label>🏢 供应商</label><input type="text" id="searchSupplier" placeholder="例: 博伊特"></div>
            <div class="filter-item"><label>📅 年份范围</label><div style="display:flex; gap:8px;"><input type="number" id="yearStart" placeholder="起始年" style="width:100px"><span>—</span><input type="number" id="yearEnd" placeholder="结束年" style="width:100px"></div></div>
            <div style="display:flex; gap:12px;"><button class="btn" id="queryBtn">🔎 执行查询</button><button class="btn" id="resetBtn" style="background:#6a7e8b;">🧹 清空条件</button></div>
        </div>
        <div class="results-count" id="resultCount">匹配设备: 0 台</div>
        <div class="table-wrapper"><table id="resultTable"><thead><tr><th>设备名称</th><th>参数/规格</th><th>采购年份</th><th>采购价格(元)</th><th>供应商</th><th>备注</th><th>匹配类型</th><tr></thead><tbody id="resultTableBody"></tbody></table></div>
        <div class="info-note" id="approxHint" style="display:none;">⚡ 未找到完全匹配的参数，已按数值相似度排序推荐设备。</div>
    </div>
    <div class="footer-note">渗滤液处理组内部使用</div>
</div>

        let currentPassword = null;
        let equipmentData = [];
        
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('loginPassword');
        const togglePassword = document.getElementById('togglePassword');
        const loginError = document.getElementById('loginError');
        
        function decryptData(password) {
            try {
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, password);
                const plainText = decrypted.toString(CryptoJS.enc.Utf8);
                if (!plainText) throw new Error("解密失败");
                const data = JSON.parse(plainText);
                if (!Array.isArray(data)) throw new Error("数据格式错误");
                return data;
            } catch(e) {
                return null;
            }
        }
        
        // 特征提取与查询（完全保留）
        function extractFeatures(str){
            if(!str) return [];
            const regex = /([a-zA-Zμ°℃]*)(\d+(?:\.\d+)?)\s*([a-zA-Z0-9\/°℃μ³²·]*)/g;
            let res = [], m;
            while((m = regex.exec(str)) !== null){
                let prefix = m[1].toLowerCase();
                let num = parseFloat(m[2]);
                let suffix = m[3].toLowerCase();
                let unit = (prefix + suffix).replace(/[^a-z0-9\/]/g,'');
                if(unit && !isNaN(num)) res.push({num, unit});
            }
            return res;
        }
        function isDiffAcceptable(qNum, dNum, unit){
            let rel=0.2, abs=2;
            if(unit==='kw'){ rel=0.2;abs=2; }
            else if(unit==='m3/h'){ rel=0.3;abs=5; }
            else if(unit==='mm'){ rel=0.1;abs=10; }
            else if(unit==='m'){ rel=0.1;abs=0.5; }
            else { rel=0.5;abs=5; }
            let maxDiff = Math.max(qNum*rel, abs);
            return Math.abs(dNum - qNum) <= maxDiff;
        }
        function filterResults(){
            let nameKw = (document.getElementById('searchName')?.value || '').trim().toLowerCase();
            let paramKw = (document.getElementById('searchParam')?.value || '').trim().toLowerCase();
            let supplierKw = (document.getElementById('searchSupplier')?.value || '').trim().toLowerCase();
            let startYear = parseInt(document.getElementById('yearStart')?.value) || 0;
            let endYear = parseInt(document.getElementById('yearEnd')?.value) || 9999;
            let filtered = equipmentData.filter(item => {
                if(nameKw && !item.name.toLowerCase().includes(nameKw)) return false;
                if(supplierKw && !(item.supplier || '').toLowerCase().includes(supplierKw)) return false;
                let y = item.year;
                if(startYear && y < startYear) return false;
                if(endYear && y > endYear) return false;
                return true;
            });
            if(!paramKw){
                let sorted = [...filtered].sort((a,b)=> b.year - a.year || (a.supplier||'').localeCompare(b.supplier||''));
                renderQueryResult(sorted.map(i=>({...i, matchType:'基础筛选'})));
                return;
            }
            let exact = filtered.filter(i => i.params.toLowerCase().includes(paramKw));
            if(exact.length){
                let sorted = exact.sort((a,b)=> b.year - a.year || (a.supplier||'').localeCompare(b.supplier||''));
                renderQueryResult(sorted.map(i=>({...i, matchType:'参数精确匹配'})));
                return;
            }
            let queryFeats = extractFeatures(paramKw);
            if(queryFeats.length===0){
                let sorted = [...filtered].sort((a,b)=>b.year - a.year);
                renderQueryResult(sorted.map(i=>({...i, matchType:'无数值匹配'})));
                return;
            }
            let scored = filtered.map(item => {
                let devFeats = extractFeatures(item.params);
                let totalScore=0, matchCount=0;
                for(let qf of queryFeats){
                    let candidates = devFeats.filter(df=>df.unit===qf.unit);
                    if(!candidates.length) continue;
                    let best=0;
                    for(let df of candidates){
                        if(isDiffAcceptable(qf.num, df.num, qf.unit)){
                            let diff = Math.abs(df.num - qf.num);
                            let maxD = Math.max(qf.num*0.2,2);
                            let score = Math.max(0, 100 - (diff/maxD)*100);
                            best = Math.max(best,score);
                        }
                    }
                    if(best>0){ totalScore+=best; matchCount++; }
                }
                let final = matchCount===0?0:totalScore/queryFeats.length;
                let type = final>=80?'高度匹配':(final>=50?'部分匹配':'弱匹配');
                return {...item, matchScore:final, matchType:type};
            });
            scored.sort((a,b)=> b.year - a.year || (a.supplier||'').localeCompare(b.supplier||'') || b.matchScore - a.matchScore);
            renderQueryResult(scored);
        }
        function renderQueryResult(items){
            let tbody = document.getElementById('resultTableBody');
            if(!tbody) return;
            tbody.innerHTML = items.map(item => `<tr><td>${escapeHtml(item.name)}</td><td>${escapeHtml(item.params)}</td><td>${item.year}</td><td class="price-col">¥ ${item.price.toLocaleString()}</td><td>${escapeHtml(item.supplier||'—')}</td><td>${escapeHtml(item.remark||'—')}</td><td><span class="match-badge">${item.matchType||'相关'}</span></td></tr>`).join('');
            document.getElementById('resultCount').innerText = `匹配设备: ${items.length} 台`;
            let anyPartial = items.some(i=>i.matchType && (i.matchType.includes('部分')||i.matchType.includes('弱')));
            document.getElementById('approxHint').style.display = anyPartial?'block':'none';
        }
        
        function escapeHtml(str){ if(!str)return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]||m)); }
        
        function doLogin() {
            const pwd = passwordInput.value.trim();
            if (!pwd) {
                loginError.textContent = '请输入密码';
                return;
            }
            const decryptedData = decryptData(pwd);
            if (!decryptedData) {
                loginError.textContent = '密码错误，无法解密数据';
                passwordInput.value = '';
                return;
            }
            currentPassword = pwd;
            equipmentData = decryptedData;
            loginOverlay.style.display = 'none';
            mainContent.style.display = 'block';
            filterResults();
            // 绑定查询事件
            document.getElementById('queryBtn').addEventListener('click', filterResults);
            document.getElementById('resetBtn').addEventListener('click', ()=>{
                document.getElementById('searchName').value='';
                document.getElementById('searchParam').value='';
                document.getElementById('searchSupplier').value='';
                document.getElementById('yearStart').value='';
                document.getElementById('yearEnd').value='';
                filterResults();
            });
        }
        
        loginBtn?.addEventListener('click', doLogin);
        if(passwordInput) passwordInput.addEventListener('keypress', (e)=>{ if(e.key === 'Enter') doLogin(); });
        if(togglePassword) togglePassword.addEventListener('click', ()=>{ let t = passwordInput.type === 'password' ? 'text' : 'password'; passwordInput.type = t; togglePassword.textContent = t === 'password' ? '👁️' : '👁️‍🗨️'; });
        
        loginOverlay.style.display = 'flex';
        mainContent.style.display = 'none';
    })();
